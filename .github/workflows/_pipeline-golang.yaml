name: Pipeline - Go Application

on:
  workflow_call:
    inputs:
      app-name:
        description: 'Application name'
        required: true
        type: string
      project:
        description: 'Project name (e.g., devportal)'
        required: true
        type: string
      gitops-repo:
        description: 'GitOps repository (e.g., org/gitops-devportal)'
        required: true
        type: string
      go-version:
        description: 'Go version to use'
        required: false
        type: string
        default: '1.23'
      working-directory:
        description: 'Working directory for commands'
        required: false
        type: string
        default: '.'
      dockerfile:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: 'Dockerfile'
      registry:
        description: 'Container registry'
        required: false
        type: string
        default: 'ghcr.io'
      platforms:
        description: 'Target platforms'
        required: false
        type: string
        default: 'linux/amd64'
      enable-lint:
        description: 'Enable linting'
        required: false
        type: boolean
        default: true
      enable-test:
        description: 'Enable testing'
        required: false
        type: boolean
        default: true
      enable-coverage:
        description: 'Enable coverage reporting'
        required: false
        type: boolean
        default: true
      enable-signing:
        description: 'Enable image signing with cosign'
        required: false
        type: boolean
        default: true
      enable-scanning:
        description: 'Enable vulnerability scanning'
        required: false
        type: boolean
        default: true
      scan-severity:
        description: 'Vulnerability scan severity'
        required: false
        type: string
        default: 'CRITICAL,HIGH'
      enable-auto-release:
        description: 'Enable automatic release on merge to main'
        required: false
        type: boolean
        default: true
      enable-changelog:
        description: 'Enable changelog generation'
        required: false
        type: boolean
        default: false
      changelog-config:
        description: 'Path to git-cliff config'
        required: false
        type: string
        default: 'cliff.toml'
      deploy-environment:
        description: 'Environment to deploy (auto-detected if not set)'
        required: false
        type: string
        default: ''
      build-runner:
        description: 'Runner for build and deploy jobs'
        required: false
        type: string
        default: 'shared-runners'
    secrets:
      argocd-auth-token:
        description: 'ArgoCD authentication token'
        required: false
      argocd-server:
        description: 'ArgoCD server URL'
        required: false

jobs:
  # Step 1: CI - Lint, Test, Security Scan
  ci:
    name: CI
    uses: mrops-br/gha-workflows/.github/workflows/_ci-golang.yaml@main
    with:
      go-version: ${{ inputs.go-version }}
      working-directory: ${{ inputs.working-directory }}
      enable-lint: ${{ inputs.enable-lint }}
      enable-test: ${{ inputs.enable-test }}
      enable-coverage: ${{ inputs.enable-coverage }}
      enable-security-scan: true
      runner: 'ubuntu-latest'

  # Step 2: Detect Git Flow context
  detect-context:
    name: Detect Context
    runs-on: ubuntu-latest
    outputs:
      branch-type: ${{ steps.gitflow.outputs.branch-type }}
      version: ${{ steps.gitflow.outputs.version }}
      source-tag: ${{ steps.gitflow.outputs.source-tag }}
      should-push: ${{ steps.push.outputs.should-push }}
      is-main-merge: ${{ steps.push.outputs.is-main-merge }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 10

      - name: Detect Git Flow
        id: gitflow
        uses: mrops-br/gha-workflows/.github/actions/gitflow/detect-version@main

      - name: Determine push strategy
        id: push
        uses: mrops-br/gha-workflows/.github/actions/gitflow/determine-push@main
        with:
          branch-type: ${{ steps.gitflow.outputs.branch-type }}

  # Step 3: Build, Sign, Scan Docker Image
  build:
    name: Build
    needs: [ci, detect-context]
    if: |
      always() &&
      needs.ci.result == 'success' &&
      needs.detect-context.outputs.is-main-merge == 'false'
    uses: mrops-br/gha-workflows/.github/workflows/_build-docker.yaml@main
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    with:
      image-name: ${{ github.repository_owner }}/${{ inputs.app-name }}
      context: ${{ inputs.working-directory }}
      dockerfile: ${{ inputs.dockerfile }}
      registry: ${{ inputs.registry }}
      platforms: ${{ inputs.platforms }}
      push: ${{ needs.detect-context.outputs.should-push == 'true' }}
      enable-signing: ${{ inputs.enable-signing }}
      enable-scanning: ${{ inputs.enable-scanning }}
      scan-severity: ${{ inputs.scan-severity }}
      runner: ${{ inputs.build-runner }}
    secrets: inherit

  # Step 4: Determine environment for deployment
  determine-env:
    name: Determine Environment
    runs-on: ubuntu-latest
    needs: [build, detect-context]
    if: |
      always() &&
      needs.build.result == 'success' &&
      needs.detect-context.outputs.should-push == 'true'
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      should-deploy: ${{ steps.env.outputs.should-deploy }}
      image-tag: ${{ steps.env.outputs.image-tag }}
    steps:
      - name: Determine deployment environment
        id: env
        run: |
          # Use manual input if provided (workflow_dispatch)
          if [ -n "${{ inputs.deploy-environment }}" ]; then
            ENV="${{ inputs.deploy-environment }}"
            SHOULD_DEPLOY="true"
            # For manual deploys, extract the first tag from build outputs
            IMAGE_TAG=$(echo "${{ needs.build.outputs.image-tags }}" | head -1)

          # PR to main from release/* or hotfix/* → Deploy to STAGING with RC tag
          elif [[ "${{ github.event_name }}" == "pull_request" ]] && \
               [[ "${{ github.base_ref }}" == "main" ]] && \
               [[ "${{ needs.detect-context.outputs.branch-type }}" =~ ^(release|hotfix)$ ]]; then
            ENV="stg"
            SHOULD_DEPLOY="true"
            # Extract version-rc tag from build outputs (e.g., 1.2.3-rc)
            IMAGE_TAG=$(echo "${{ needs.build.outputs.image-tags }}" | grep -E '[0-9]+\.[0-9]+\.[0-9]+-rc' | head -1)
            if [ -z "$IMAGE_TAG" ]; then
              IMAGE_TAG="${{ github.sha }}"
            fi
            echo "📦 PR to main → Deploy to STAGING with tag: $IMAGE_TAG"

          # Push to develop → Deploy to DEV
          elif [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            ENV="dev"
            SHOULD_DEPLOY="true"
            IMAGE_TAG="dev-${{ github.sha }}"
            echo "🚀 Push to develop → Deploy to DEV with tag: $IMAGE_TAG"

          # Push to release/* or hotfix/* branches (not PR) → no auto-deploy
          # (only PRs to main from these branches deploy to staging)
          elif [[ "${{ github.ref }}" =~ ^refs/heads/(release|hotfix)/ ]]; then
            ENV=""
            SHOULD_DEPLOY="false"
            IMAGE_TAG=""
            echo "ℹ️ Release/hotfix branch push → Build only, no deployment"

          # Unknown/other scenarios
          else
            ENV=""
            SHOULD_DEPLOY="false"
            IMAGE_TAG=""
            echo "ℹ️ No deployment configured for this scenario"
          fi

          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "should-deploy=$SHOULD_DEPLOY" >> $GITHUB_OUTPUT
          echo "image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

          echo "Environment: $ENV"
          echo "Should Deploy: $SHOULD_DEPLOY"
          echo "Image Tag: $IMAGE_TAG"

  # Step 5: Deploy to Environment (dev/stg only, prd is manual)
  deploy:
    name: Deploy to ${{ needs.determine-env.outputs.environment }}
    needs: [build, detect-context, determine-env]
    if: |
      needs.determine-env.outputs.should-deploy == 'true' &&
      needs.determine-env.outputs.environment != ''
    uses: mrops-br/gha-workflows/.github/workflows/_deploy-argocd.yaml@main
    with:
      app-name: ${{ inputs.app-name }}
      image-name: ${{ github.repository_owner }}/${{ inputs.app-name }}
      project: ${{ inputs.project }}
      environment: ${{ needs.determine-env.outputs.environment }}
      gitops-repo: ${{ inputs.gitops-repo }}
      image-tag: ${{ needs.determine-env.outputs.image-tag }}
      registry: ${{ inputs.registry }}
      wait-for-sync: true
      runner: ${{ inputs.build-runner }}
    secrets:
      argocd-auth-token: ${{ secrets.argocd-auth-token }}
      argocd-server: ${{ secrets.argocd-server }}

  # Step 6: Release (on main branch merge)
  release:
    name: Release
    needs: [detect-context]
    if: |
      needs.detect-context.outputs.is-main-merge == 'true' &&
      inputs.enable-auto-release
    uses: mrops-br/gha-workflows/.github/workflows/_gitflow-release.yaml@main
    permissions:
      contents: write
      packages: write
      id-token: write
    secrets: inherit
    with:
      auto-detect-version: true
      enable-docker-retag: true
      docker-registry: ${{ inputs.registry }}
      docker-image-name: ${{ github.repository_owner }}/${{ inputs.app-name }}
      docker-semver-tags: true
      enable-changelog: ${{ inputs.enable-changelog }}
      changelog-config: ${{ inputs.changelog-config }}
      enable-git-tag: true
      enable-merge-back: true
      runner: 'ubuntu-latest'

  # Step 7: Deploy to Production (after successful release)
  deploy-production:
    name: Deploy to Production
    needs: [detect-context, release]
    if: |
      needs.detect-context.outputs.is-main-merge == 'true' &&
      needs.release.result == 'success'
    uses: mrops-br/gha-workflows/.github/workflows/_deploy-argocd.yaml@main
    with:
      app-name: ${{ inputs.app-name }}
      image-name: ${{ github.repository_owner }}/${{ inputs.app-name }}
      project: ${{ inputs.project }}
      environment: prd
      gitops-repo: ${{ inputs.gitops-repo }}
      image-tag: latest
      registry: ${{ inputs.registry }}
      wait-for-sync: true
      runner: ${{ inputs.build-runner }}
    secrets:
      argocd-auth-token: ${{ secrets.argocd-auth-token }}
      argocd-server: ${{ secrets.argocd-server }}

  # Summary
  summary:
    name: Pipeline Summary
    needs: [ci, detect-context, build, deploy, release, deploy-production]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate summary
        run: |
          echo "## 🚀 Go Application Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Application**: \`${{ inputs.app-name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch Type**: ${{ needs.detect-context.outputs.branch-type }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CI | ${{ needs.ci.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release | ${{ needs.release.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy to Production | ${{ needs.deploy-production.result }} |" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.detect-context.outputs.is-main-merge }}" == "true" ]]; then
            if [[ "${{ needs.release.result }}" == "success" ]]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "✅ **Release completed successfully!**" >> $GITHUB_STEP_SUMMARY
              if [[ "${{ needs.deploy-production.result }}" == "success" ]]; then
                echo "✅ **Deployed to PRODUCTION**" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "❌ **Release failed**" >> $GITHUB_STEP_SUMMARY
            fi
          elif [[ "${{ needs.build.result }}" == "success" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            if [[ "${{ needs.detect-context.outputs.should-push }}" == "true" ]]; then
              echo "✅ **Build and push completed**" >> $GITHUB_STEP_SUMMARY
              if [[ "${{ needs.deploy.result }}" == "success" ]]; then
                echo "✅ **Deployed to ${{ needs.determine-env.outputs.environment }}**" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "✅ **Build validated (not pushed)**" >> $GITHUB_STEP_SUMMARY
            fi
          fi
